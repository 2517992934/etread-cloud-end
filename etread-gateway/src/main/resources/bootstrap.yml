spring:
  application:
    name: etread-gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8048
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        file-extension: yaml
        group: DEFAULT_GROUP
        namespace: public
        extension-configs:
          - data-id: gateway-routes.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-security.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-ratelimit.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: gateway-cors.yaml
            group: DEFAULT_GROUP
            refresh: true
